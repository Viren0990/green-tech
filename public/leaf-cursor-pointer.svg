<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="leafGradHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="stemGradHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#422006"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow effect -->
  <path d="M4 2 C8 1, 16 2, 20 6 C24 10, 25 18, 22 22 C18 20, 10 18, 6 14 C2 10, 1 5, 4 2 Z" 
        fill="#4ade80" opacity="0.3" filter="url(#glow)"/>
  <!-- Leaf body -->
  <path d="M4 2 C8 1, 16 2, 20 6 C24 10, 25 18, 22 22 C18 20, 10 18, 6 14 C2 10, 1 5, 4 2 Z" 
        fill="url(#leafGradHover)" stroke="#166534" stroke-width="1.2"/>
  <!-- Main vein -->
  <path d="M4 2 C10 8, 16 14, 22 22" 
        fill="none" stroke="#166534" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <!-- Side veins -->
  <path d="M8 5 C10 7, 12 8, 15 8" fill="none" stroke="#166534" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M6 8 C9 10, 12 11, 16 11" fill="none" stroke="#166534" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M7 12 C10 13, 13 14, 17 14" fill="none" stroke="#166534" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M10 16 C13 16, 16 17, 19 18" fill="none" stroke="#166534" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Stem -->
  <path d="M22 22 C24 24, 26 27, 28 30" 
        fill="none" stroke="url(#stemGradHover)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Highlight shimmer -->
  <path d="M6 3 C9 3, 12 4, 14 6 C10 5, 7 4, 6 3 Z" 
        fill="white" opacity="0.4"/>
</svg>
